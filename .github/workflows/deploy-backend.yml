name: Deploy Backend to EC2

on:
  push:
    branches:
      - main # Skrip ini jalan otomatis jika ada push ke branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8' # Menyesuaikan dengan log error Anda sebelumnya
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -Dspring.profiles.active=prod # Membangun file .jar

      - name: Copy .jar to EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "target/akidsmaginepg-backend.jar"
          target: "/home/ubuntu/"
          strip_components: 1

      - name: Restart Spring Boot in EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Cari proses Java dan matikan
            PID=$(pgrep -f 'akidsmaginepg-backend.jar')
            if [ -n "$PID" ]; then
              echo "Mematikan aplikasi lama dengan PID: $PID"
              kill -9 $PID
            fi
            
            # Jalankan aplikasi baru di background
            echo "Menjalankan aplikasi versi terbaru..."
            nohup java -jar /home/ubuntu/akidsmaginepg-backend.jar> /home/ubuntu/log.txt 2>&1 &
            echo "Deploy selesai!"