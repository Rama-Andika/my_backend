name: Deploy Backend to ECS

on:
  push:
    branches:
      - main

env:
  # Konfigurasi Docker
  DOCKER_IMAGE: ramaandikaa/my-backend:latest

  # Konfigurasi AWS ECS
  AWS_REGION: ap-southeast-3
  ECS_CLUSTER: main-cluster
  ECS_SERVICE: my-backend-task-service-il7ika2m

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Inject application.properties
        run: |
          echo "${{ secrets.PROPERTIES }}" > src/main/resources/application.properties

      - name: Inject application-prod.properties
        run: |
          echo "${{ secrets.PROD_PROPERTIES }}" > src/main/resources/application-prod.properties

      - name: Build .jar with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }} .
          docker push ${{ env.DOCKER_IMAGE }}

      # --- INTEGRASI AWS ECS ---

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Perintahkan ECS untuk Deploy (Force New Deployment)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment