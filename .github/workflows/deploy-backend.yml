name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 1. Menambahkan env untuk mengatasi warning Node 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Update ke v4

      - name: Setup Java JDK 8
        uses: actions/setup-java@v4 # Update ke v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # 2. Skip test agar build tidak gagal karena masalah koneksi database di server GitHub
        run: mvn clean package -DskipTests

      - name: Copy .jar to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7 # 3. Gunakan versi stabil
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "target/akidsmaginepg-backend.jar"
          target: "/home/ubuntu/"
          strip_components: 1

      - name: Restart Spring Boot in EC2
        uses: appleboy/ssh-action@v1.0.3 # 4. Gunakan versi stabil
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 5. Tambahkan '|| true' agar tidak error saat aplikasi memang sedang mati
            PID=$(pgrep -f 'akidsmaginepg-backend.jar') || true
            if [ -n "$PID" ]; then
              echo "Mematikan aplikasi lama dengan PID: $PID"
              kill -9 $PID
            fi
            
            # 6. Kembalikan pemanggilan profile prod ke perintah java -jar
            echo "Menjalankan aplikasi versi terbaru..."
            nohup java -jar /home/ubuntu/akidsmaginepg-backend.jar --spring.profiles.active=prod > /home/ubuntu/log.txt 2>&1 &
            echo "Deploy selesai!"