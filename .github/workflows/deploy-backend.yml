name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 1. Menambahkan env untuk mengatasi warning Node 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Update ke v4

      - name: Setup Java JDK 8
        uses: actions/setup-java@v4 # Update ke v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        # 2. Skip test agar build tidak gagal karena masalah koneksi database di server GitHub
        run: mvn clean package -DskipTests

      - name: Copy .jar to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7 # 3. Gunakan versi stabil
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "target/akidsmaginepg-backend.jar"
          target: "/home/ubuntu/"
          strip_components: 1

      - name: Restart Spring Boot in EC2
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_KEY }}
            script: |
              echo "Mencari aplikasi yang sedang berjalan..."
              # Cari PID khusus untuk proses java, abaikan proses grep/bash
              PID=$(ps aux | grep 'java -jar /home/ubuntu/akidsmaginepg-backend.jar' | grep -v grep | awk '{print $2}')
              
              if [ -n "$PID" ]; then
                echo "Mematikan aplikasi lama dengan PID: $PID"
                kill -9 $PID
              else
                echo "Tidak ada aplikasi lama yang berjalan."
              fi
              
              echo "Menjalankan aplikasi versi terbaru..."
              # Tambahkan < /dev/null agar SSH tidak menggantung
              nohup java -jar /home/ubuntu/akidsmaginepg-backend.jar --spring.profiles.active=prod > /home/ubuntu/log.txt 2>&1 < /dev/null &
              echo "Deploy selesai!"