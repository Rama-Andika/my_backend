name: Deploy Backend with Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      # GANTI "usernameanda" di bawah ini!
      DOCKER_IMAGE: ramaandikaa/my-backend:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Inject application.properties
        run: |
          echo "${{ secrets.PROPERTIES }}" > src/main/resources/application.properties

      - name: Inject application-prod.properties
        run: |
          echo "${{ secrets.PROD_PROPERTIES }}" > src/main/resources/application-prod.properties

      - name: Build .jar with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }} .
          docker push ${{ env.DOCKER_IMAGE }}

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Pastikan Docker & Docker Compose terinstall di EC2
            if ! [ -x "$(command -v docker)" ]; then
              echo "Menginstall Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker ubuntu
            fi
            
            # Matikan aplikasi Java versi lama SECARA AMAN (anti bunuh diri)
            # Trik [j]ava membuat pencarian mengabaikan proses grep/bash itu sendiri
            PID=$(ps aux | grep '[j]ava -jar.*akidsmaginepg-backend.jar' | awk '{print $2}')
            if [ -n "$PID" ]; then
              echo "Menemukan aplikasi lama dengan PID $PID, mematikan..."
              kill -9 $PID || true
            else
              echo "Tidak ada aplikasi Java lama yang berjalan."
            fi
            
            # Masuk ke folder home, jalankan Docker Compose
            cd /home/ubuntu
            echo "Menarik Docker Image terbaru..."
            docker compose pull 
            
            echo "Menyalakan Container..."
            docker compose up -d 
            
            # Bersihkan image lama agar disk EC2 tidak penuh
            docker image prune -f
            echo "Deploy Docker selesai!"