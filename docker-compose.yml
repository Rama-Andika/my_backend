version: '3.8'
services:
  backend-api:
    # GANTI "usernameanda" dengan username Docker Hub Anda yang asli
    image: ramaandikaa/my-backend:latest
    container_name: my-backend-app
    ports:
      - "9091:9091"
    restart: always # Jika server EC2 mati/restart, aplikasi akan otomatis nyala lagi

    logging:
      driver: awslogs
      options:
        awslogs-region: ap-southeast-3
        awslogs-group: cw-backend
        awslogs-stream: api-server-1